syntax = "proto3";

package dict.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "pagination/v1/pagination.proto";

// 字典分类管理服务
service DictCategoryService {
  // 查询字典分类列表
  rpc List(pagination.PagingRequest) returns (ListDictCategoryResponse) {}
  // 统计字典分类数量
  rpc Count(pagination.PagingRequest) returns (CountDictCategoryResponse) {}
  // 查询字典分类详情
  rpc Get(GetDictCategoryRequest) returns (DictCategory) {}
  // 创建字典分类
  rpc Create(CreateDictCategoryRequest) returns (google.protobuf.Empty) {}
  // 更新字典分类
  rpc Update(UpdateDictCategoryRequest) returns (google.protobuf.Empty) {}
  // 删除字典分类
  rpc Delete(DeleteDictCategoryRequest) returns (google.protobuf.Empty) {}
}

// 字典分类
message DictCategory {
  // 分类层级
  enum CategoryLevel {
    // 未指定
    CATEGORY_LEVEL_UNSPECIFIED = 0;
    // 一级分类
    ROOT = 1;
    // 二级分类
    CHILD = 2;
  }

  // 分类场景
  enum Scene {
    // 未指定
    SCENE_UNSPECIFIED = 0;
    // 页面
    PAGE = 1;
    // 菜单
    MENU = 2;
    // 提示信息
    PROMPT = 3;
    // 设备
    DEVICE = 4;
    // 其它
    OTHER = 5;
  }

  // 主键ID
  optional uint32 id = 1 [json_name = "id"];
  // 父分类ID
  optional uint32 parent_id = 2 [json_name = "parentId"];
  // 树路径
  optional string path = 3 [json_name = "path"];
  // 分类唯一标识
  optional string category_key = 4 [json_name = "categoryKey"];
  // 分类名称
  optional string category_name = 5 [json_name = "categoryName"];
  // 分类层级
  optional CategoryLevel category_level = 6 [json_name = "categoryLevel"];
  // 使用场景
  optional Scene scene = 7 [json_name = "scene"];
  // 是否内置
  optional bool is_builtin = 8 [json_name = "isBuiltin"];
  // 是否启用
  optional bool is_enabled = 9 [json_name = "isEnabled"];
  // 排序值
  optional uint32 sort_order = 10 [json_name = "sortOrder"];
  // 所属租户ID
  optional uint32 tenant_id = 11 [json_name = "tenantId"];
  // 所属租户名称
  optional string tenant_name = 12 [json_name = "tenantName"];
  // 备注
  optional string remark = 13 [json_name = "remark"];
  // 描述
  optional string description = 14 [json_name = "description"];
  // 子分类
  repeated DictCategory children = 15 [json_name = "children"];

  // 创建者ID
  optional uint32 created_by = 100 [json_name = "createdBy"];
  // 更新者ID
  optional uint32 updated_by = 101 [json_name = "updatedBy"];
  // 删除者ID
  optional uint32 deleted_by = 102 [json_name = "deletedBy"];
  // 创建时间
  optional google.protobuf.Timestamp created_at = 200 [json_name = "createdAt"];
  // 更新时间
  optional google.protobuf.Timestamp updated_at = 201 [json_name = "updatedAt"];
  // 删除时间
  optional google.protobuf.Timestamp deleted_at = 202 [json_name = "deletedAt"];
}

// 字典分类列表响应
message ListDictCategoryResponse {
  // 数据项
  repeated DictCategory items = 1;
  // 总数
  uint64 total = 2;
}

// 查询字典分类请求
message GetDictCategoryRequest {
  // 查询条件
  oneof query_by {
    // 按ID查询
    uint32 id = 1;
    // 按分类标识查询
    string category_key = 2 [json_name = "categoryKey"];
  }

  // 返回字段掩码
  optional google.protobuf.FieldMask view_mask = 100 [json_name = "viewMask"];
}

// 创建字典分类请求
message CreateDictCategoryRequest {
  // 待创建数据
  DictCategory data = 1;
}

// 更新字典分类请求
message UpdateDictCategoryRequest {
  // 目标ID
  uint32 id = 1;
  // 更新数据
  DictCategory data = 2;
  // 更新字段掩码
  google.protobuf.FieldMask update_mask = 3 [json_name = "updateMask"];
  // 不存在时是否允许创建
  optional bool allow_missing = 4 [json_name = "allowMissing"];
}

// 删除字典分类请求
message DeleteDictCategoryRequest {
  // 待删除ID列表
  repeated uint32 ids = 1;
}

// 字典分类数量响应
message CountDictCategoryResponse {
  // 数量
  uint64 count = 1;
}
