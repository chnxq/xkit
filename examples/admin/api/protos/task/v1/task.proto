syntax = "proto3";

package task.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "pagination/v1/pagination.proto";

// 任务管理服务
service TaskService {
  // 查询任务列表
  rpc List(pagination.PagingRequest) returns (ListTaskResponse) {}

  // 统计任务数量
  rpc Count(pagination.PagingRequest) returns (CountTaskResponse) {}

  // 查询任务详情
  rpc Get(GetTaskRequest) returns (Task) {}

  // 创建任务
  rpc Create(CreateTaskRequest) returns (google.protobuf.Empty) {}

  // 更新任务
  rpc Update(UpdateTaskRequest) returns (google.protobuf.Empty) {}

  // 删除任务
  rpc Delete(DeleteTaskRequest) returns (google.protobuf.Empty) {}

  // 启动任务
  rpc Start(StartTaskRequest) returns (google.protobuf.Empty) {}

  // 停止任务
  rpc Stop(StopTaskRequest) returns (google.protobuf.Empty) {}

  // 立即执行一次任务
  rpc RunOnce(RunTaskOnceRequest) returns (google.protobuf.Empty) {}
}

// 任务
message Task {
  // 任务类型
  enum TaskType {
    // 未指定
    TASK_TYPE_UNSPECIFIED = 0;
    // 函数
    FUNCTION = 1;
    // 接口
    API = 2;
    // 外部执行
    EXTERNAL = 3;
  }

  // 任务状态
  enum Status {
    // 未指定
    STATUS_UNSPECIFIED = 0;
    // 已停止
    STOPPED = 1;
    // 运行中
    RUNNING = 2;
    // 已禁用
    DISABLED = 3;
  }

  // 任务ID
  optional uint64 id = 1 [json_name = "id"];
  // 任务名称
  optional string task_name = 2 [json_name = "taskName"];
  // 任务分组ID
  optional uint64 group_id = 3 [json_name = "groupId"];
  // 任务类型
  optional TaskType task_type = 4 [json_name = "taskType"];
  // cron表达式
  optional string cron_expression = 5 [json_name = "cronExpression"];
  // 调用目标
  optional string invoke_target = 6 [json_name = "invokeTarget"];
  // 目标参数
  optional string args = 7 [json_name = "args"];
  // 重试次数
  optional uint32 retry = 8 [json_name = "retry"];
  // 是否并发
  optional bool concurrent = 9 [json_name = "concurrent"];
  // 启动时返回的ID
  optional uint32 entry_id = 10 [json_name = "entryId"];
  // 任务状态
  optional Status status = 11 [json_name = "status"];
  // 备注
  optional string remark = 12 [json_name = "remark"];
  // 租户ID，0表示全局
  optional uint64 tenant_id = 13 [json_name = "tenantId"];

  // 创建者ID
  optional uint64 created_by = 100 [json_name = "createdBy"];
  // 更新者ID
  optional uint64 updated_by = 101 [json_name = "updatedBy"];
  // 删除者ID
  optional uint64 deleted_by = 102 [json_name = "deletedBy"];
  // 创建时间
  optional google.protobuf.Timestamp created_at = 200 [json_name = "createdAt"];
  // 更新时间
  optional google.protobuf.Timestamp updated_at = 201 [json_name = "updatedAt"];
  // 删除时间
  optional google.protobuf.Timestamp deleted_at = 202 [json_name = "deletedAt"];
}

// 任务列表响应
message ListTaskResponse {
  repeated Task items = 1;
  uint64 total = 2;
}

// 查询任务请求
message GetTaskRequest {
  oneof query_by {
    // 按ID查询
    uint64 id = 1 [json_name = "id"];
    // 按任务名称查询
    string task_name = 2 [json_name = "taskName"];
  }

  // 返回字段掩码
  optional google.protobuf.FieldMask view_mask = 100 [json_name = "viewMask"];
}

// 创建任务请求
message CreateTaskRequest {
  Task data = 1;
}

// 更新任务请求
message UpdateTaskRequest {
  uint64 id = 1;
  Task data = 2;
  google.protobuf.FieldMask update_mask = 3 [json_name = "updateMask"];
  optional bool allow_missing = 4 [json_name = "allowMissing"];
}

// 删除任务请求
message DeleteTaskRequest {
  repeated uint64 ids = 1 [json_name = "ids"];
}

// 启动任务请求
message StartTaskRequest {
  uint64 id = 1 [json_name = "id"];
}

// 停止任务请求
message StopTaskRequest {
  uint64 id = 1 [json_name = "id"];
}

// 立即执行任务请求
message RunTaskOnceRequest {
  uint64 id = 1 [json_name = "id"];
  optional string input = 2 [
    json_name = "input",
    (gnostic.openapi.v3.property) = {description: "立即执行时的临时输入参数"}
  ];
}

// 任务数量响应
message CountTaskResponse {
  uint64 count = 1;
}
