syntax = "proto3";

package admin.service.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "pagination/v1/pagination.proto";
import "dict/v1/dict_category.proto";

// 字典分类管理服务
service DictCategoryService {
  // 查询字典分类列表
  rpc List(pagination.PagingRequest) returns (dict.service.v1.ListDictCategoryResponse) {
    option (google.api.http) = { get: "/admin/v1/dict/categories" };
  }

  // 查询字典分类详情
  rpc Get(dict.service.v1.GetDictCategoryRequest) returns (dict.service.v1.DictCategory) {
    option (google.api.http) = {
      get: "/admin/v1/dict/categories/{id}"
      additional_bindings { get: "/admin/v1/dict/categories/key/{category_key}" }
    };
  }

  // 创建字典分类
  rpc Create(dict.service.v1.CreateDictCategoryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/admin/v1/dict/categories"
      body: "*"
    };
  }

  // 更新字典分类
  rpc Update(dict.service.v1.UpdateDictCategoryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/admin/v1/dict/categories/{id}"
      body: "*"
    };
  }

  // 删除字典分类
  rpc Delete(dict.service.v1.DeleteDictCategoryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/admin/v1/dict/categories" };
  }
}
