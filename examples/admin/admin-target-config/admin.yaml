    service_methods:
      Create:
        imports:
          - alias: identityv1
            path: '{{module}}/api/gen/identity/v1'
        body: |
          if _, err := requirePlatformContext({{ctx}}, "api create"); err != nil {
          	return nil, identityv1.ErrorForbidden("%s", err.Error())
          }
          return s.{{repoField}}.Create({{ctx}}, {{param.req}})
      Update:
        imports:
          - alias: identityv1
            path: '{{module}}/api/gen/identity/v1'
        body: |
          if _, err := requirePlatformContext({{ctx}}, "api update"); err != nil {
          	return nil, identityv1.ErrorForbidden("%s", err.Error())
          }
          return s.{{repoField}}.Update({{ctx}}, {{param.req}})
      Delete:
        imports:
          - alias: identityv1
            path: '{{module}}/api/gen/identity/v1'
        body: |
          if _, err := requirePlatformContext({{ctx}}, "api delete"); err != nil {
          	return nil, identityv1.ErrorForbidden("%s", err.Error())
          }
          return s.{{repoField}}.Delete({{ctx}}, {{param.req}})
      SyncApis:
        imports:
          - alias: identityv1
            path: '{{module}}/api/gen/identity/v1'
        body: |
          if _, err := requirePlatformContext({{ctx}}, "api sync"); err != nil {
          	return nil, identityv1.ErrorForbidden("%s", err.Error())
          }
          if custom, ok := any(s.{{repoField}}).(interface {
          	SyncApisFromOpenAPI(context.Context) error
          }); ok {
          	if err := custom.SyncApisFromOpenAPI({{ctx}}); err != nil {
          		return nil, err
          	}
          	return {{successReturn}}, nil
          }
          return {{successReturn}}, nil
      GetWalkRouteData:
        imports:
          - path: fmt
        body: |
          _ = {{param.req}}
          if reader, ok := s.{{repoField}}.(repo.ApiOpenAPISyncer); ok {
          	return reader.GetOpenAPIRouteData({{ctx}})
          }
          return nil, fmt.Errorf("api repo does not support OpenAPI route data")
    filters:
      allow:
        - id
        - description
        - module
        - module_description
        - operation
        - path
        - method
        - scope
        - created_by
        - updated_by
        - deleted_by
        - status
    operations:
