      Get:
        body: |
          if req == nil {
          	return nil, fmt.Errorf("invalid parameter")
          }
          
          builder := r.entClient.Client().DictLabel.Query()
          switch req.GetQueryBy().(type) {
          case *dictv1.GetDictLabelRequest_Id:
          	builder.Where(dictlabel.IDEQ(req.GetId()))
          case *dictv1.GetDictLabelRequest_LabelKey:
          	builder.Where(dictlabel.LabelKeyEQ(req.GetLabelKey()))
