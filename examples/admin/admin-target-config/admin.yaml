            	builder.SetPayloadJSON(payloadValue)
            }
            builder.SetIsBuiltin(req.Data.GetIsBuiltin())
            builder.SetStatus(dictlabel.Status(req.Data.GetStatus().String()))
            builder.SetNillableSortOrder(req.Data.SortOrder)
            builder.SetNillableTenantID(req.Data.TenantId)
            builder.SetNillableRemark(req.Data.Remark)
            builder.SetCreatedAt(now)
            builder.SetCreatedBy(uint32(viewer.UserID()))

            entity, err := builder.Save(ctx)
            if err != nil {
            	r.log.Errorf("insert dict_label failed: %s", err.Error())
            	return nil, err
            }

            _ = entity
            return nil, nil
        Update:
          imports:
            - path: encoding/json
            - path: strings
          body: |
            if req == nil || req.Data == nil {
            	return nil, fmt.Errorf("invalid parameter")
            }
            if custom, ok := any(r).(interface {
            	dictLabelCustomUpdate(ctx context.Context, req *dictv1.UpdateDictLabelRequest) (*emptypb.Empty, error)
            }); ok {
            	return custom.dictLabelCustomUpdate(ctx, req)
            }
            builder := r.entClient.Client().DictLabel.UpdateOneID(req.GetId())
            now, viewer := r.generatedAuditContext(ctx)
            builder.SetCategoryID(req.Data.GetCategoryId())
            if req.Data.LabelCode != nil {
            	builder.SetNillableLabelCode(req.Data.LabelCode)
            } else if req.GetUpdateMask() != nil && dictLabelFieldMaskContains(req.GetUpdateMask().GetPaths(), "label_code", "labelCode") {
            	builder.ClearLabelCode()
            }
            builder.SetLabelKind(dictlabel.LabelKind(req.Data.GetLabelKind().String()))
            if req.Data.DefaultText != nil {
            	builder.SetNillableDefaultText(req.Data.DefaultText)
            } else if req.GetUpdateMask() != nil && dictLabelFieldMaskContains(req.GetUpdateMask().GetPaths(), "default_text", "defaultText") {
            	builder.ClearDefaultText()
            }
            if req.Data.PayloadJson != nil {
            	payloadJSON := strings.TrimSpace(req.Data.GetPayloadJson())
            	payloadValue := map[string]any{}
            	if payloadJSON != "" {
            		if err := json.Unmarshal([]byte(payloadJSON), &payloadValue); err != nil {
            			return nil, fmt.Errorf("invalid payload_json: %w", err)
            		}
            	}
            	builder.SetPayloadJSON(payloadValue)
            } else if req.GetUpdateMask() != nil && dictLabelFieldMaskContains(req.GetUpdateMask().GetPaths(), "payload_json", "payloadJson") {
            	builder.ClearPayloadJSON()
            }
            builder.SetIsBuiltin(req.Data.GetIsBuiltin())
            builder.SetStatus(dictlabel.Status(req.Data.GetStatus().String()))
            if req.Data.SortOrder != nil {
            	builder.SetNillableSortOrder(req.Data.SortOrder)
            } else if req.GetUpdateMask() != nil && dictLabelFieldMaskContains(req.GetUpdateMask().GetPaths(), "sort_order", "sortOrder") {
            	builder.ClearSortOrder()
            }
            if req.Data.Remark != nil {
            	builder.SetNillableRemark(req.Data.Remark)
            } else if req.GetUpdateMask() != nil && dictLabelFieldMaskContains(req.GetUpdateMask().GetPaths(), "remark") {
            	builder.ClearRemark()
            }
            builder.SetUpdatedAt(now)
            builder.SetUpdatedBy(uint32(viewer.UserID()))

            if err := builder.Exec(ctx); err != nil {
            	r.log.Errorf("update dict_label failed: %s", err.Error())
            	return nil, err
            }

            return nil, nil
