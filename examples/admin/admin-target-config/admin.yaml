          - [title, Title, 标题, 220]
          - field: content
            en: Content
            cn: 内容
            width: 360
            slot: content
          - [type, Type, 类型, 120]
          - [status, Status, 状态, 120]
          - [senderName, Sender Name, 发送人, 150]
          - field: tenantName
            en: Message Ownership
            cn: 消息归属
            width: 160
            slot: tenant
            title_key: page.tenant.messageOwnership
          - [createdAt, Created At, 创建时间, 170]
        filters:
          - [title, Input, Title, 标题]
          - [type, Select, Type, 类型]
    service_repos:
      - field: internalMessageRecipientRepo
        interface: InternalMessageRecipientRepo
    service_methods:
      ListMessage:
        body: |
          if {{param.req}} == nil {
          	return nil, v11.ErrorBadRequest("paging request is required")
          }
          listReq := repo.PagingRequest{
          	Limit: int({{param.req}}.GetLimit()),
          	Offset: int({{param.req}}.GetOffset()),
          	Sorting: {{param.req}}.GetSorting(),
          }
          return s.{{repoField}}.ListByPaging({{ctx}}, listReq)
      GetMessage:
        body: |
          if {{param.req}} == nil {
          	return nil, v11.ErrorBadRequest("request is required")
          }
          return s.{{repoField}}.GetByID({{ctx}}, {{param.req}}.GetId())
      UpdateMessage:
        imports:
          - alias: crudviewer
            path: github.com/chnxq/x-crud/viewer
        body: |
          if {{param.req}} == nil || {{param.req}}.Data == nil {
          	return nil, v11.ErrorBadRequest("message payload is required")
          }
          viewer := crudviewer.MustFromContext({{ctx}})
          updatedBy := uint32(viewer.UserID())
          {{param.req}}.Data.UpdatedBy = &updatedBy
          if err := s.{{repoField}}.UpdateByID({{ctx}}, {{param.req}}.GetId(), {{param.req}}.Data); err != nil {
          	return nil, err
          }
          return {{successReturn}}, nil
      DeleteMessage:
        body: |
          if {{param.req}} == nil {
          	return nil, v11.ErrorBadRequest("request is required")
          }
          if err := s.{{repoField}}.DeleteByID({{ctx}}, {{param.req}}.GetId()); err != nil {
          	return nil, err
          }
          return {{successReturn}}, nil
      SendMessage:
        imports:
          - alias: crudviewer
            path: github.com/chnxq/x-crud/viewer
        body: |
          if {{param.req}} == nil {
          	return nil, v11.ErrorBadRequest("request is required")
          }
          
          title := normalizeRequiredText({{param.req}}.GetTitle())
          content := normalizeRequiredText({{param.req}}.GetContent())
          if title == "" || content == "" {
          	return nil, v11.ErrorBadRequest("title and content are required")
          }
          
          viewer := crudviewer.MustFromContext({{ctx}})
          senderID := uint32(viewer.UserID())
          tenantID := uint32(viewer.TenantID())
          
          recipientIDs := {{param.req}}.GetTargetUserIds()
          if {{param.req}}.GetTargetAll() {
          	var err error
          	recipientIDs, err = s.listAllUserIDs({{ctx}})
          	if err != nil {
          		return nil, err
          	}
          }
          if {{param.req}}.GetRecipientUserId() > 0 {
          	recipientIDs = append(recipientIDs, {{param.req}}.GetRecipientUserId())
          }
          recipientIDs = dedupeUint32(recipientIDs)
          if len(recipientIDs) == 0 {
          	return nil, v11.ErrorBadRequest("recipient ids are required")
          }
          
          var categoryID *uint32
          if {{param.req}}.GetCategoryId() > 0 {
          	value := {{param.req}}.GetCategoryId()
          	categoryID = &value
          }
          
          messageID, err := s.{{repoField}}.CreateAndSend({{ctx}}, repo.SendMessageArgs{
          	Title: title,
          	Content: content,
          	Type: {{param.req}}.GetType(),
          	CategoryID: categoryID,
          	SenderID: senderID,
          	TenantID: tenantID,
          	RecipientIDs: recipientIDs,
          })
          if err != nil {
          	return nil, err
          }
          
          s.publishNotificationEvents({{ctx}}, recipientIDs, messageID, title, content)
          return &v11.SendMessageResponse{MessageId: messageID}, nil
      RevokeMessage:
        imports:
          - alias: crudviewer
            path: github.com/chnxq/x-crud/viewer
        body: |
          if {{param.req}} == nil || {{param.req}}.GetMessageId() == 0 {
          	return nil, v11.ErrorBadRequest("message id is required")
          }
          viewer := crudviewer.MustFromContext({{ctx}})
          if err := s.{{repoField}}.Revoke({{ctx}}, repo.RevokeMessageArgs{
          	MessageID: {{param.req}}.GetMessageId(),
          	SenderID: uint32(viewer.UserID()),
          }); err != nil {
          	return nil, err
          }
          return {{successReturn}}, nil
    filters:
      allow:
        - id
        - title
        - content
        - sender_id
        - category_id
        - status
        - type
        - created_by
        - updated_by
        - deleted_by
        - tenant_id
    generate:
      service_stub: true
      rest_register: true
      grpc_register: true
