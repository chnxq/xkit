            	if err != nil {
            		return nil, err
            	}
            	if len(items) == 0 {
            		return nil, fmt.Errorf("dict_label relation hydration returned no result")
            	}
            	dto = items[0]
            }

            return dto, nil
        Create:
          imports:
            - path: encoding/json
            - path: strings
          body: |
            if req == nil || req.Data == nil {
            	return nil, fmt.Errorf("invalid parameter")
            }
            if custom, ok := any(r).(interface {
            	dictLabelCustomCreate(ctx context.Context, req *dictv1.CreateDictLabelRequest) (*emptypb.Empty, error)
            }); ok {
            	return custom.dictLabelCustomCreate(ctx, req)
            }

            builder := r.entClient.Client().DictLabel.Create()
            now, viewer := r.generatedAuditContext(ctx)
            builder.SetCategoryID(req.Data.GetCategoryId())
            builder.SetLabelKey(req.Data.GetLabelKey())
            builder.SetNillableLabelCode(req.Data.LabelCode)
            builder.SetLabelKind(dictlabel.LabelKind(req.Data.GetLabelKind().String()))
            builder.SetNillableDefaultText(req.Data.DefaultText)
            if req.Data.PayloadJson != nil {
            	payloadJSON := strings.TrimSpace(req.Data.GetPayloadJson())
            	payloadValue := map[string]any{}
            	if payloadJSON != "" {
