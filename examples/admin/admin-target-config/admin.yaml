    repo_methods:
      List:
        body: |
          if req == nil {
          	return nil, fmt.Errorf("invalid parameter")
          }
          
          builder := r.roleQueryWithHybridTenantScope(ctx)
          countBuilder := r.roleQueryWithHybridTenantScope(ctx)
          
          if err := r.applyGeneratedFilters(builder, req); err != nil {
          	return nil, err
          }
          if err := r.applyGeneratedFilters(countBuilder, req); err != nil {
          	return nil, err
          }
          
          listReq := &v1.PagingRequest{
          	Page: req.Page,
          	PageSize: req.PageSize,
          	Offset: req.Offset,
          	Limit: req.Limit,
          	Token: req.Token,
          	NoPaging: req.NoPaging,
          	OrderBy: req.OrderBy,
          	Sorting: req.Sorting,
          	FieldMask: req.FieldMask,
          }
          listReq.Sorting = withDefaultSorting(listReq.Sorting, "sort_order", paginationv1.Sorting_ASC)
          if listReq.Page == nil && listReq.PageSize == nil && listReq.Offset == nil && listReq.Limit == nil && !listReq.GetNoPaging() {
          	limit := uint32(20)
          	offset := req.GetOffset()
          	listReq.Limit = &limit
          	listReq.Offset = &offset
          }
          if _, _, err := r.repository.BuildListSelectorWithPaging(builder, listReq); err != nil {
          	return nil, err
          }
          
          total, err := countBuilder.Count(ctx)
          if err != nil {
          	r.log.Errorf("count role failed: %s", err.Error())
          	return nil, err
          }
          entities, err := builder.All(ctx)
          if err != nil {
          	r.log.Errorf("list role failed: %s", err.Error())
          	return nil, err
          }
          
          items, err := r.roleEnrichListDTOs(ctx, entities)
          if err != nil {
          	return nil, err
          }
          return &permissionv1.ListRoleResponse{Total: uint64(total), Items: items}, nil
      Get:
        body: |
          if req == nil {
          	return nil, fmt.Errorf("invalid parameter")
          }
          
          entity, err := r.entClient.Client().Role.Query().Where(role.IDEQ(req.GetId())).Only(ctx)
          if err != nil {
          	r.log.Errorf("get role failed: %s", err.Error())
          	return nil, err
          }
          if err := ensureHybridTenantAccessible(ctx, entity.TenantID); err != nil {
          	return nil, err
          }
          
          items, err := r.roleEnrichGetDTO(ctx, []*ent.Role{entity})
          if err != nil {
          	return nil, err
          }
          if len(items) == 0 {
          	return nil, fmt.Errorf("role relation hydration returned no result")
          }
          return items[0], nil
    filters:
      allow:
        - id
        - name
        - code
        - type
        - created_by
        - updated_by
        - deleted_by
        - remark
        - sort_order
        - tenant_id
        - status
    operations:
      create: true
      delete: true
      get: true
      list: true
      update: true
    generate:
      service_stub: true
      repo_crud: true
      rest_register: true
      grpc_register: true
