            - field: method
              en: Method
              cn: 请求方法
              width: 100
              slot: method
            - [module, Module, 模块, 150]
            - [moduleDescription, Module Description, 模块描述, 180]
            - [operation, Operation, 操作, 220]
            - field: scope
              en: Scope
              cn: 作用域
              width: 120
              slot: scope
            - [status, Status, 状态, 100]
            - [createdAt, Created At, 创建时间, 170]
          filters:
            - [method, Select, Method, 请求方法]
            - [module, Input, Module, 模块]
            - [path, Input, Path, 路径]
        form:
          fields:
            - [path, Path, 路径]
            - [method, Method, 请求方法]
            - [description, Description, 描述]
            - [module, Module, 模块]
            - [moduleDescription, Module Description, 模块描述]
            - [operation, Operation, 操作]
            - [scope, Scope, 作用域]
            - [status, Status, 状态]
