service: xdev
module: admin/modules/xdev
host_module:
  resources:
    menus:
      - name: XdevRoot
        path: /xdev
        component: BasicLayout
        redirect: /xdev/device-model-type
        type: catalog
        meta:
          title: 设备管理
          icon: lucide:cpu
          authority:
            - xdev:dir
        children:
          - name: XdevDeviceModelType
            path: /xdev/device-model-type
            component: /xdev/device-model-type/index
            type: menu
            meta:
              title: 设备类型
              icon: lucide:folder-tree
              authority:
                - xdev:device-model-type:view
                - xdev:device-model-type:create
                - xdev:device-model-type:edit
                - xdev:device-model-type:delete
                - xdev:device-model-type:export
          - name: XdevDeviceModel
            path: /xdev/device-model
            component: /xdev/device-model/index
            type: menu
            meta:
              title: 设备型号
              icon: lucide:package-search
              authority:
                - xdev:device-model:view
                - xdev:device-model:create
                - xdev:device-model:edit
                - xdev:device-model:delete
                - xdev:device-model:export
          - name: XdevDevice
            path: /xdev/device
            component: /xdev/device/index
            type: menu
            meta:
              title: 设备信息
              icon: lucide:hard-drive
              authority:
                - xdev:device:view
                - xdev:device:create
                - xdev:device:edit
                - xdev:device:delete
                - xdev:device:export
          - name: XdevDeviceGroup
            path: /xdev/device-group
            component: /xdev/device-group/index
            type: menu
            meta:
              title: 设备组
              icon: lucide:network
              authority:
                - xdev:device-group:view
                - xdev:device-group:create
                - xdev:device-group:edit
                - xdev:device-group:delete
                - xdev:device-group:export
resources:
  - name: device
    proto_service: xdev.service.v1.DeviceService
    entity: Device
    dto_import: xdev/api/gen/xdev/service/v1
    dto_type: Device
    tenant_scope: tenant_scoped
    repo_interface: DeviceRepo
    frontend:
      view_path: device/device
      i18n_prefix: page.device
      list:
        columns:
          - [deviceCode, Device Code, 设备编码, 180]
          - [name, Name, 设备名称, 180]
          - field: modelId
            en: Model ID
            cn: 设备型号
            width: 140
            relation:
              resource: device_model
              label_field: modelName
              value_field: id
          - [serialNumber, Serial Number, 设备序列号, 180]
          - [useStatus, Use Status, 使用状态, 120]
          - [createdAt, Created At, 创建时间, 170]
        filters:
          - [deviceCode, Input, Device Code, 设备编码]
          - [name, Input, Name, 设备名称]
          - field: modelId
            component: Select
            en: Model ID
            cn: 设备型号
            relation:
              resource: device_model
              label_field: modelName
              value_field: id
          - [useStatus, Select, Use Status, 使用状态]
      form:
        fields:
          - [deviceCode, Device Code, 设备编码]
          - [name, Name, 设备名称]
          - field: modelId
            en: Model ID
            cn: 设备型号
            relation:
              resource: device_model
              label_field: modelName
              value_field: id
          - [serialNumber, Serial Number, 设备序列号]
          - [useStatus, Use Status, 使用状态]
    filters:
      allow:
        - id
        - device_code
        - name
        - model_id
        - serial_number
        - use_status
        - tenant_id
        - created_by
        - updated_by
        - created_at
        - updated_at
        - deleted_at
    operations:
      create: true
      delete: true
      export: true
      get: true
      list: true
      count: true
      update: true
    generate:
      service_stub: true
      repo_crud: true
      rest_register: true
      grpc_register: true

  - name: device_model
    proto_service: xdev.service.v1.DeviceModelService
    entity: DeviceModel
    dto_import: xdev/api/gen/xdev/service/v1
    dto_type: DeviceModel
    tenant_scope: tenant_scoped
    repo_interface: DeviceModelRepo
    frontend:
      view_path: device-model/device-model
      i18n_prefix: page.deviceModel
      list:
        columns:
          - [modelName, Model Name, 型号, 180]
          - field: modelTypeId
            en: Model Type ID
            cn: 型号分类
            width: 140
            relation:
              resource: device_model_type
              label_field: modelTypeName
              value_field: id
          - [description, Description, 型号描述, 220]
          - [remark, Remark, 备注, 180]
          - [createdAt, Created At, 创建时间, 170]
        filters:
          - [modelName, Input, Model Name, 型号]
          - field: modelTypeId
            component: Select
            en: Model Type ID
            cn: 型号分类
            relation:
              resource: device_model_type
              label_field: modelTypeName
              value_field: id
      form:
        fields:
          - [modelName, Model Name, 型号]
          - field: modelTypeId
            en: Model Type ID
            cn: 型号分类
            relation:
              resource: device_model_type
              label_field: modelTypeName
              value_field: id
          - [description, Description, 型号描述]
          - [remark, Remark, 备注]
    filters:
      allow:
        - id
        - model_name
        - model_type_id
        - tenant_id
        - created_by
        - created_at
        - updated_at
        - deleted_at
    operations:
      create: true
      delete: true
      export: true
      get: true
      list: true
      count: true
      update: true
    generate:
      service_stub: true
      repo_crud: true
      rest_register: true
      grpc_register: true

