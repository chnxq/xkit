service: xdev
module: admin/modules/xdev
resources:
  - name: device
    proto_service: xdev.service.v1.DeviceService
    entity: Device
    dto_import: admin/modules/xdev/api/gen/xdev/service/v1
    dto_type: Device
    tenant_scope: tenant_scoped
    repo_interface: DeviceRepo
    frontend:
      view_path: asset/device
      i18n_prefix: page.device
      list:
        columns:
          - [deviceCode, Device Code, 设备编码, 180]
          - [name, Name, 设备名称, 180]
          - [modelId, Model ID, 设备型号ID, 140]
          - [serialNumber, Serial Number, 设备序列号, 180]
          - [useStatus, Use Status, 使用状态, 120]
          - [createdAt, Created At, 创建时间, 170]
        filters:
          - [deviceCode, Input, Device Code, 设备编码]
          - [name, Input, Name, 设备名称]
          - [modelId, InputNumber, Model ID, 设备型号ID]
          - [useStatus, Input, Use Status, 使用状态]
      form:
        fields:
          - [deviceCode, Device Code, 设备编码]
          - [name, Name, 设备名称]
          - [modelId, Model ID, 设备型号ID]
          - [serialNumber, Serial Number, 设备序列号]
          - [useStatus, Use Status, 使用状态]
    filters:
      allow:
        - id
        - device_code
        - name
        - model_id
        - serial_number
        - use_status
        - tenant_id
        - created_by
        - updated_by
        - created_at
        - updated_at
        - deleted_at
    operations:
      create: true
      delete: true
      get: true
      list: true
      count: true
      update: true
    generate:
      service_stub: true
      repo_crud: true
      rest_register: true
      grpc_register: true
  - name: device_model
    proto_service: xdev.service.v1.DeviceModelService
    entity: DeviceModel
    dto_import: admin/modules/xdev/api/gen/xdev/service/v1
    dto_type: DeviceModel
    tenant_scope: tenant_scoped
    repo_interface: DeviceModelRepo
    frontend:
      view_path: asset/device-model
      i18n_prefix: page.deviceModel
      list:
        columns:
          - [modelName, Model Name, 型号, 180]
          - [modelTypeId, Model Type ID, 型号分类ID, 140]
          - [description, Description, 型号描述, 220]
          - [remark, Remark, 备注, 180]
          - [createdAt, Created At, 创建时间, 170]
        filters:
          - [modelName, Input, Model Name, 型号]
          - [modelTypeId, InputNumber, Model Type ID, 型号分类ID]
      form:
        fields:
          - [modelName, Model Name, 型号]
          - [modelTypeId, Model Type ID, 型号分类ID]
          - [description, Description, 型号描述]
          - [remark, Remark, 备注]
    filters:
      allow:
        - id
        - model_name
        - model_type_id
        - tenant_id
        - created_by
        - created_at
        - updated_at
        - deleted_at
    operations:
      create: true
      delete: true
      get: true
      list: true
      count: true
      update: true
    generate:
      service_stub: true
      repo_crud: true
      rest_register: true
      grpc_register: true
  - name: device_model_type
    proto_service: xdev.service.v1.DeviceModelTypeService
    entity: DeviceModelType
    dto_import: admin/modules/xdev/api/gen/xdev/service/v1
    dto_type: DeviceModelType
    tenant_scope: tenant_scoped
    repo_interface: DeviceModelTypeRepo
    frontend:
      view_path: asset/device-model-type
      i18n_prefix: page.deviceModelType
      list:
        columns:
          - [modelTypeName, Model Type Name, 型号分类名, 220]
          - [modelTypeValue, Model Type Value, 型号分类值, 180]
          - [useCase, Use Case, 型号用途, 140]
          - [typeDesc, Description, 描述, 220]
          - [createdAt, Created At, 创建时间, 170]
        filters:
          - [modelTypeName, Input, Model Type Name, 型号分类名]
          - [modelTypeValue, Input, Model Type Value, 型号分类值]
          - [useCase, Input, Use Case, 型号用途]
      form:
        fields:
          - [modelTypeName, Model Type Name, 型号分类名]
          - [modelTypeValue, Model Type Value, 型号分类值]
          - [useCase, Use Case, 型号用途]
          - [typeDesc, Description, 描述]
    filters:
      allow:
        - id
        - model_type_name
        - model_type_value
        - use_case
        - tenant_id
        - created_by
        - created_at
        - updated_at
        - deleted_at
    operations:
      create: true
      delete: true
      get: true
      list: true
      count: true
      update: true
    generate:
      service_stub: true
      repo_crud: true
      rest_register: true
      grpc_register: true
