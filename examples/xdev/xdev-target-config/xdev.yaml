        - id
        - model_type_name
        - model_type_value
        - use_case
        - tenant_id
        - created_by
        - created_at
        - updated_at
        - deleted_at
    operations:
      create: true
      delete: true
      export: true
      get: true
      list: true
      count: true
      update: true
    generate:
      service_stub: true
      repo_crud: true
      rest_register: true
      grpc_register: true

