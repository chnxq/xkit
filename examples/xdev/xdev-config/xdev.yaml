service: xdev
module: xdev
resources:
  - name: device
    proto_service: xdev.service.v1.DeviceService
    entity: Device
    dto_import: xdev/api/gen/xdev/service/v1
    dto_type: Device
    tenant_scope: tenant_scoped
    repo_interface: DeviceRepo
    frontend:
      view_path: device/device
      i18n_prefix: page.device
      list:
        columns:
          - [deviceCode, Device Code, 设备编码, 180]
          - [name, Name, 设备名称, 180]
          - field: modelId
            en: Model ID
            cn: 设备型号
            width: 140
            relation:
              resource: device_model
              label_field: modelName
              value_field: id
          - [serialNumber, Serial Number, 设备序列号, 180]
          - [useStatus, Use Status, 使用状态, 120]
          - [createdAt, Created At, 创建时间, 170]
        filters:
          - [deviceCode, Input, Device Code, 设备编码]
          - [name, Input, Name, 设备名称]
          - [modelId, InputNumber, Model ID, 设备型号ID]
          - [useStatus, Select, Use Status, 使用状态]
      form:
        fields:
          - [deviceCode, Device Code, 设备编码]
          - [name, Name, 设备名称]
          - field: modelId
            en: Model ID
            cn: 设备型号
            relation:
              resource: device_model
              label_field: modelName
              value_field: id
          - [serialNumber, Serial Number, 设备序列号]
          - [useStatus, Use Status, 使用状态]
    filters:
      allow:
        - id
        - device_code
        - name
        - model_id
        - serial_number
        - use_status
        - tenant_id
        - created_by
        - updated_by
        - created_at
        - updated_at
        - deleted_at
    operations:
      create: true
      delete: true
      export: true
      get: true
      list: true
      count: true
      update: true
    generate:
      service_stub: true
      repo_crud: true
      rest_register: true
      grpc_register: true

