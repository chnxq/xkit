syntax = "proto3";

package xdev.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "pagination/v1/pagination.proto";

// 设备凭据服务
service DeviceCredentialService {
  // 查询设备凭据列表
  rpc List(pagination.PagingRequest) returns (DeviceCredentialServiceListResponse) {
    option (google.api.http) = {get: "/xdev/v1/device-credentials"};
  }

  // 统计设备凭据数量
  rpc Count(pagination.PagingRequest) returns (DeviceCredentialServiceCountResponse) {
    option (google.api.http) = {get: "/xdev/v1/device-credentials/count"};
  }

  // 查询设备凭据详情
  rpc Get(DeviceCredentialServiceGetRequest) returns (DeviceCredentialServiceGetResponse) {
    option (google.api.http) = {get: "/xdev/v1/device-credentials/{id}"};
  }

  // 创建设备凭据
  rpc Create(DeviceCredentialServiceCreateRequest) returns (DeviceCredentialServiceCreateResponse) {
    option (google.api.http) = {
      post: "/xdev/v1/device-credentials"
      body: "*"
    };
  }

  // 更新设备凭据
  rpc Update(DeviceCredentialServiceUpdateRequest) returns (DeviceCredentialServiceUpdateResponse) {
    option (google.api.http) = {
      put: "/xdev/v1/device-credentials/{id}"
      body: "*"
    };
  }

  // 删除设备凭据
  rpc Delete(DeviceCredentialServiceDeleteRequest) returns (DeviceCredentialServiceDeleteResponse) {
    option (google.api.http) = {delete: "/xdev/v1/device-credentials/{id}"};
  }
}

// 设备凭据
message DeviceCredential {
  enum CredentialType {
    CREDENTIAL_TYPE_UNSPECIFIED = 0;
    STRING = 1;
    JSON = 2;
    OTHER = 3;
  }

  optional uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "设备凭据ID"}
  ];
  optional uint32 device_id = 2 [
    json_name = "deviceId",
    (gnostic.openapi.v3.property) = {description: "设备ID"}
  ];
  optional string credential_name = 3 [
    json_name = "credentialName",
    (gnostic.openapi.v3.property) = {description: "凭据名称"}
  ];
  optional CredentialType credential_type = 4 [
    json_name = "credentialType",
    (gnostic.openapi.v3.property) = {description: "凭据类型"}
  ];
  optional string credential_value = 5 [
    json_name = "credentialValue",
    (gnostic.openapi.v3.property) = {description: "凭据内容"}
  ];
  optional string remark = 6 [
    json_name = "remark",
    (gnostic.openapi.v3.property) = {description: "备注"}
  ];
  optional uint32 tenant_id = 20 [
    json_name = "tenantId",
    (gnostic.openapi.v3.property) = {description: "租户ID"}
  ];
}

// 设备凭据列表响应
message DeviceCredentialServiceListResponse {
  repeated DeviceCredential items = 1;
  uint64 total = 2;
}

// 设备凭据数量响应
message DeviceCredentialServiceCountResponse {
  uint64 count = 1;
}

// 设备凭据详情请求
message DeviceCredentialServiceGetRequest {
  uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "设备凭据ID"}
  ];
  optional google.protobuf.FieldMask view_mask = 100 [
    json_name = "viewMask",
    (gnostic.openapi.v3.property) = {description: "返回字段掩码"}
  ];
}

// 设备凭据详情响应
message DeviceCredentialServiceGetResponse {
  DeviceCredential data = 1;
}

// 创建设备凭据请求
message DeviceCredentialServiceCreateRequest {
  DeviceCredential data = 1 [json_name = "data"];
}

// 创建设备凭据响应
message DeviceCredentialServiceCreateResponse {}

// 更新设备凭据请求
message DeviceCredentialServiceUpdateRequest {
  uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "设备凭据ID"}
  ];
  DeviceCredential data = 2 [json_name = "data"];
  google.protobuf.FieldMask update_mask = 3 [
    json_name = "updateMask",
    (gnostic.openapi.v3.property) = {description: "更新字段掩码"}
  ];
  optional bool allow_missing = 4 [
    json_name = "allowMissing",
    (gnostic.openapi.v3.property) = {description: "资源不存在时是否允许创建"}
  ];
}

// 更新设备凭据响应
message DeviceCredentialServiceUpdateResponse {}

// 删除设备凭据请求
message DeviceCredentialServiceDeleteRequest {
  uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "设备凭据ID"}
  ];
}

// 删除设备凭据响应
message DeviceCredentialServiceDeleteResponse {}
