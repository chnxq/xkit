syntax = "proto3";

package xdev.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "pagination/v1/pagination.proto";

// 设备组设备关联服务
service DeviceGroupDeviceService {
  // 查询设备组设备关联列表
  rpc List(pagination.PagingRequest) returns (DeviceGroupDeviceServiceListResponse) {
    option (google.api.http) = {get: "/xdev/v1/device-group-devices"};
  }

  // 统计设备组设备关联数量
  rpc Count(pagination.PagingRequest) returns (DeviceGroupDeviceServiceCountResponse) {
    option (google.api.http) = {get: "/xdev/v1/device-group-devices/count"};
  }

  // 查询设备组设备关联详情
  rpc Get(DeviceGroupDeviceServiceGetRequest) returns (DeviceGroupDeviceServiceGetResponse) {
    option (google.api.http) = {get: "/xdev/v1/device-group-devices/{id}"};
  }

  // 创建设备组设备关联
  rpc Create(DeviceGroupDeviceServiceCreateRequest) returns (DeviceGroupDeviceServiceCreateResponse) {
    option (google.api.http) = {
      post: "/xdev/v1/device-group-devices"
      body: "*"
    };
  }

  // 更新设备组设备关联
  rpc Update(DeviceGroupDeviceServiceUpdateRequest) returns (DeviceGroupDeviceServiceUpdateResponse) {
    option (google.api.http) = {
      put: "/xdev/v1/device-group-devices/{id}"
      body: "*"
    };
  }

  // 删除设备组设备关联
  rpc Delete(DeviceGroupDeviceServiceDeleteRequest) returns (DeviceGroupDeviceServiceDeleteResponse) {
    option (google.api.http) = {delete: "/xdev/v1/device-group-devices/{id}"};
  }
}

// 设备组设备关联
message DeviceGroupDevice {
  optional uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "关联ID"}
  ];
  optional uint32 group_id = 2 [
    json_name = "groupId",
    (gnostic.openapi.v3.property) = {description: "设备组ID"}
  ];
  optional uint32 device_id = 3 [
    json_name = "deviceId",
    (gnostic.openapi.v3.property) = {description: "设备ID"}
  ];
  optional uint32 tenant_id = 20 [
    json_name = "tenantId",
    (gnostic.openapi.v3.property) = {description: "租户ID"}
  ];
  optional uint64 created_by = 100 [
    json_name = "createdBy",
    (gnostic.openapi.v3.property) = {description: "创建者"}
  ];
  optional google.protobuf.Timestamp created_at = 200 [
    json_name = "createdAt",
    (gnostic.openapi.v3.property) = {description: "创建时间"}
  ];
  optional google.protobuf.Timestamp updated_at = 201 [
    json_name = "updatedAt",
    (gnostic.openapi.v3.property) = {description: "最后更新时间"}
  ];
  optional google.protobuf.Timestamp deleted_at = 202 [
    json_name = "deletedAt",
    (gnostic.openapi.v3.property) = {description: "删除时间"}
  ];
}

// 设备组设备关联列表响应
message DeviceGroupDeviceServiceListResponse {
  repeated DeviceGroupDevice items = 1;
  uint64 total = 2;
}

// 设备组设备关联数量响应
message DeviceGroupDeviceServiceCountResponse {
  uint64 count = 1;
}

// 设备组设备关联详情请求
message DeviceGroupDeviceServiceGetRequest {
  uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "关联ID"}
  ];
  optional google.protobuf.FieldMask view_mask = 100 [
    json_name = "viewMask",
    (gnostic.openapi.v3.property) = {description: "返回字段掩码"}
  ];
}

// 设备组设备关联详情响应
message DeviceGroupDeviceServiceGetResponse {
  DeviceGroupDevice data = 1;
}

// 创建设备组设备关联请求
message DeviceGroupDeviceServiceCreateRequest {
  DeviceGroupDevice data = 1 [json_name = "data"];
}

// 创建设备组设备关联响应
message DeviceGroupDeviceServiceCreateResponse {}

// 更新设备组设备关联请求
message DeviceGroupDeviceServiceUpdateRequest {
  uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "关联ID"}
  ];
  DeviceGroupDevice data = 2 [json_name = "data"];
  google.protobuf.FieldMask update_mask = 3 [
    json_name = "updateMask",
    (gnostic.openapi.v3.property) = {description: "更新字段掩码"}
  ];
  optional bool allow_missing = 4 [
    json_name = "allowMissing",
    (gnostic.openapi.v3.property) = {description: "资源不存在时是否允许创建"}
  ];
}

// 更新设备组设备关联响应
message DeviceGroupDeviceServiceUpdateResponse {}

// 删除设备组设备关联请求
message DeviceGroupDeviceServiceDeleteRequest {
  uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "关联ID"}
  ];
}

// 删除设备组设备关联响应
message DeviceGroupDeviceServiceDeleteResponse {}
