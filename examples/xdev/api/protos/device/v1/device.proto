syntax = "proto3";

package xdev.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "pagination/v1/pagination.proto";

// 设备服务
service DeviceService {
  // 查询设备列表
  rpc List(pagination.PagingRequest) returns (DeviceServiceListResponse) {
    option (google.api.http) = {get: "/xdev/v1/devices"};
  }

  // 统计设备数量
  rpc Count(pagination.PagingRequest) returns (DeviceServiceCountResponse) {
    option (google.api.http) = {get: "/xdev/v1/devices/count"};
  }

  // 查询设备详情
  rpc Get(DeviceServiceGetRequest) returns (DeviceServiceGetResponse) {
    option (google.api.http) = {get: "/xdev/v1/devices/{id}"};
  }

  // 创建设备
  rpc Create(DeviceServiceCreateRequest) returns (DeviceServiceCreateResponse) {
    option (google.api.http) = {
      post: "/xdev/v1/devices"
      body: "*"
    };
  }

  // 更新设备
  rpc Update(DeviceServiceUpdateRequest) returns (DeviceServiceUpdateResponse) {
    option (google.api.http) = {
      put: "/xdev/v1/devices/{id}"
      body: "*"
    };
  }

  // 删除设备
  rpc Delete(DeviceServiceDeleteRequest) returns (DeviceServiceDeleteResponse) {
    option (google.api.http) = {delete: "/xdev/v1/devices/{id}"};
  }
}

// 设备
message Device {
  optional uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "设备ID"}
  ];
  optional string device_code = 2 [
    json_name = "deviceCode",
    (gnostic.openapi.v3.property) = {description: "设备编码"}
  ];
  optional string name = 3 [
    json_name = "name",
    (gnostic.openapi.v3.property) = {description: "设备名称"}
  ];
  optional uint32 model_id = 4 [
    json_name = "modelId",
    (gnostic.openapi.v3.property) = {description: "设备型号ID"}
  ];
  optional string serial_number = 5 [
    json_name = "serialNumber",
    (gnostic.openapi.v3.property) = {description: "设备序列号"}
  ];
  optional bytes finger_print = 6 [
    json_name = "fingerPrint",
    (gnostic.openapi.v3.property) = {description: "设备指纹"}
  ];
  optional string use_status = 7 [
    json_name = "useStatus",
    (gnostic.openapi.v3.property) = {description: "使用状态"}
  ];
  optional bytes meta_data = 8 [
    json_name = "metaData",
    (gnostic.openapi.v3.property) = {description: "其他数据"}
  ];
  optional uint32 tenant_id = 20 [
    json_name = "tenantId",
    (gnostic.openapi.v3.property) = {description: "租户ID"}
  ];
  optional uint64 created_by = 100 [
    json_name = "createdBy",
    (gnostic.openapi.v3.property) = {description: "创建者"}
  ];
  optional uint64 updated_by = 101 [
    json_name = "updatedBy",
    (gnostic.openapi.v3.property) = {description: "更新者"}
  ];
  optional google.protobuf.Timestamp created_at = 200 [
    json_name = "createdAt",
    (gnostic.openapi.v3.property) = {description: "创建时间"}
  ];
  optional google.protobuf.Timestamp updated_at = 201 [
    json_name = "updatedAt",
    (gnostic.openapi.v3.property) = {description: "最后更新时间"}
  ];
  optional google.protobuf.Timestamp deleted_at = 202 [
    json_name = "deletedAt",
    (gnostic.openapi.v3.property) = {description: "删除时间"}
  ];
}

// 设备列表响应
message DeviceServiceListResponse {
  repeated Device items = 1;
  uint64 total = 2;
}

// 设备数量响应
message DeviceServiceCountResponse {
  uint64 count = 1;
}

// 设备详情请求
message DeviceServiceGetRequest {
  uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "设备ID"}
  ];
  optional google.protobuf.FieldMask view_mask = 100 [
    json_name = "viewMask",
    (gnostic.openapi.v3.property) = {description: "返回字段掩码"}
  ];
}

// 设备详情响应
message DeviceServiceGetResponse {
  Device data = 1;
}

// 创建设备请求
message DeviceServiceCreateRequest {
  Device data = 1 [json_name = "data"];
}

// 创建设备响应
message DeviceServiceCreateResponse {}

// 更新设备请求
message DeviceServiceUpdateRequest {
  uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "设备ID"}
  ];
  Device data = 2 [json_name = "data"];
  google.protobuf.FieldMask update_mask = 3 [
    json_name = "updateMask",
    (gnostic.openapi.v3.property) = {description: "更新字段掩码"}
  ];
  optional bool allow_missing = 4 [
    json_name = "allowMissing",
    (gnostic.openapi.v3.property) = {description: "资源不存在时是否允许创建"}
  ];
}

// 更新设备响应
message DeviceServiceUpdateResponse {}

// 删除设备请求
message DeviceServiceDeleteRequest {
  uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "设备ID"}
  ];
}

// 删除设备响应
message DeviceServiceDeleteResponse {}
