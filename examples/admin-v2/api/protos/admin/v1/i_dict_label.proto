syntax = "proto3";

package admin.service.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "pagination/v1/pagination.proto";
import "dict/v1/dict_label.proto";

// 字典标签管理服务
service DictLabelService {
  // 查询字典标签列表
  rpc List(pagination.PagingRequest) returns (dict.service.v1.ListDictLabelResponse) {
    option (google.api.http) = { get: "/admin/v1/dict/labels" };
  }

  // 查询字典标签详情
  rpc Get(dict.service.v1.GetDictLabelRequest) returns (dict.service.v1.DictLabel) {
    option (google.api.http) = {
      get: "/admin/v1/dict/labels/{id}"
      additional_bindings { get: "/admin/v1/dict/labels/key/{label_key}" }
    };
  }

  // 创建字典标签
  rpc Create(dict.service.v1.CreateDictLabelRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/admin/v1/dict/labels"
      body: "*"
    };
  }

  // 更新字典标签
  rpc Update(dict.service.v1.UpdateDictLabelRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/admin/v1/dict/labels/{id}"
      body: "*"
    };
  }

  // 删除字典标签
  rpc Delete(dict.service.v1.DeleteDictLabelRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/admin/v1/dict/labels" };
  }
}
