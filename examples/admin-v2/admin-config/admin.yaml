    - name: dict_category
      proto_service: admin.service.v1.DictCategoryService
      entity: DictCategory
      dto_import: admin/api/gen/dict/v1
      dto_type: DictCategory
      repo_interface: DictCategoryRepo
      # DictCategoryI18n is still schema-only in admin-v2. Keep category CRUD here
      # and extend the repo manually if category i18n hydration/writeback is needed.
      repo_methods:
        List:
          body: |
            if req == nil {
            	return nil, fmt.Errorf("invalid parameter")
            }

            builder := r.entClient.Client().DictCategory.Query()
            countBuilder := r.entClient.Client().DictCategory.Query()
            if tenantID := viewerTenantID(ctx); tenantID != nil {
            	builder.Where(dictcategory.Or(
            		dictcategory.TenantIDIsNil(),
            		dictcategory.TenantIDEQ(platformTenantID),
            		dictcategory.TenantIDEQ(*tenantID),
            	))
            	countBuilder.Where(dictcategory.Or(
            		dictcategory.TenantIDIsNil(),
            		dictcategory.TenantIDEQ(platformTenantID),
            		dictcategory.TenantIDEQ(*tenantID),
            	))
            }

            if err := r.applyGeneratedFilters(builder, req); err != nil {
            	return nil, err
            }
            if err := r.applyGeneratedFilters(countBuilder, req); err != nil {
            	return nil, err
            }

            listReq := &v1.PagingRequest{
            	Page: req.Page,
            	PageSize: req.PageSize,
            	Offset: req.Offset,
            	Limit: req.Limit,
            	Token: req.Token,
            	NoPaging: req.NoPaging,
            	OrderBy: req.OrderBy,
            	Sorting: req.Sorting,
            	FieldMask: req.FieldMask,
            }
            listReq.Sorting = withDefaultSorting(listReq.Sorting, "sort_order", paginationv1.Sorting_ASC)
            if listReq.Page == nil && listReq.PageSize == nil && listReq.Offset == nil && listReq.Limit == nil && !listReq.GetNoPaging() {
            	limit := uint32(20)
            	offset := req.GetOffset()
            	listReq.Limit = &limit
            	listReq.Offset = &offset
            }
            if _, _, err := r.repository.BuildListSelectorWithPaging(builder, listReq); err != nil {
            	return nil, err
            }

            total, err := countBuilder.Count(ctx)
            if err != nil {
            	r.log.Errorf("count dict_category failed: %s", err.Error())
            	return nil, err
            }
            entities, err := builder.All(ctx)
            if err != nil {
            	r.log.Errorf("list dict_category failed: %s", err.Error())
            	return nil, err
            }

            items := make([]*dictv1.DictCategory, 0, len(entities))
            if custom, ok := any(r).(interface {
            	dictCategoryEnrichListDTOs(context.Context, []*ent.DictCategory) ([]*dictv1.DictCategory, error)
            }); ok {
            	items, err = custom.dictCategoryEnrichListDTOs(ctx, entities)
            	if err != nil {
            		return nil, err
            	}
            } else {
            	for _, entity := range entities {
            		items = append(items, r.mapper.ToDTO(entity))
            	}
            }

            return &dictv1.ListDictCategoryResponse{Total: uint64(total), Items: items}, nil
        Get:
          body: |
            if req == nil {
            	return nil, fmt.Errorf("invalid parameter")
            }

            builder := r.entClient.Client().DictCategory.Query()
            switch req.GetQueryBy().(type) {
            case *dictv1.GetDictCategoryRequest_Id:
            	builder.Where(dictcategory.IDEQ(req.GetId()))
            case *dictv1.GetDictCategoryRequest_CategoryKey:
            	builder.Where(dictcategory.CategoryKeyEQ(req.GetCategoryKey()))
            default:
            	return nil, fmt.Errorf("invalid query by type")
            }

            entity, err := builder.Only(ctx)
            if err != nil {
            	r.log.Errorf("get dict_category failed: %s", err.Error())
            	return nil, err
            }
            if err := ensureHybridTenantAccessible(ctx, entity.TenantID); err != nil {
            	return nil, err
            }

            dto := r.mapper.ToDTO(entity)
            if custom, ok := any(r).(interface {
            	dictCategoryEnrichGetDTO(context.Context, []*ent.DictCategory) ([]*dictv1.DictCategory, error)
            }); ok {
            	items, err := custom.dictCategoryEnrichGetDTO(ctx, []*ent.DictCategory{entity})
            	if err != nil {
            		return nil, err
            	}
            	if len(items) == 0 {
            		return nil, fmt.Errorf("dict_category relation hydration returned no result")
            	}
            	dto = items[0]
            }

            return dto, nil
      tree:
        parent_field: parent_id
        path_field: path
        children_field: children
        list_method: ListTree
      filters:
