service: admin
module: admin
frontend:
  output_root: web/admin
# Schema-only relation resources without standalone proto services are intentionally
# anchored on their owning CRUD resources in this config:
# - user: UserOrgUnit, UserPosition, UserRole
# - role: RolePermission, RoleMetadata
# - permission: PermissionApi, PermissionMenu, PermissionPolicy
# The following currently remain manual-only because there is no bindable proto
# service or stable DTO surface to attach generated repo CRUD to:
# - DictCategoryI18n
# - Membership, MembershipOrgUnit, MembershipPosition, MembershipRole
resources:
    - name: api
      proto_service: admin.service.v1.ApiService
      entity: Api
      dto_import: admin/api/gen/resource/v1
      dto_type: Api
      repo_interface: ApiRepo
      service_methods:
        Create:
          imports:
            - alias: identityv1
              path: '{{module}}/api/gen/identity/v1'
          body: |
            if _, err := requirePlatformContext({{ctx}}, "api create"); err != nil {
            	return nil, identityv1.ErrorForbidden("%s", err.Error())
            }
            return s.{{repoField}}.Create({{ctx}}, {{param.req}})
        Update:
          imports:
            - alias: identityv1
              path: '{{module}}/api/gen/identity/v1'
          body: |
            if _, err := requirePlatformContext({{ctx}}, "api update"); err != nil {
            	return nil, identityv1.ErrorForbidden("%s", err.Error())
            }
            return s.{{repoField}}.Update({{ctx}}, {{param.req}})
        Delete:
          imports:
            - alias: identityv1
              path: '{{module}}/api/gen/identity/v1'
          body: |
            if _, err := requirePlatformContext({{ctx}}, "api delete"); err != nil {
            	return nil, identityv1.ErrorForbidden("%s", err.Error())
            }
            return s.{{repoField}}.Delete({{ctx}}, {{param.req}})
      filters:
        allow:
            - id
            - description
            - module
            - module_description
            - operation
            - path
            - method
            - scope
            - created_at
            - updated_at
            - deleted_at
            - status
      operations:
        create: true
        delete: true
        get: true
        list: true
        update: true
      generate:
        service_stub: true
        repo_crud: true
        rest_register: true
        grpc_register: true
