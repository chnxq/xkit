    - name: user
      proto_service: admin.service.v1.UserService
      entity: User
      dto_import: admin/api/gen/identity/v1
      dto_type: User
      tenant_scope: tenant_scoped
      repo_interface: UserRepo
      exists_fields:
        - id
        - username
      # UserOrgUnit / UserPosition / UserRole are relation entities owned by User.
      # Add a custom Get entrypoint so repo extensions can hydrate those relations.
      repo_methods:
        Get:
          body: |
            if req == nil {
            	return nil, fmt.Errorf("invalid parameter")
            }

            builder := r.entClient.Client().User.Query()
            switch req.GetQueryBy().(type) {
            case *identityv1.GetUserRequest_Id:
            	builder.Where(user.IDEQ(req.GetId()))
            case *identityv1.GetUserRequest_Username:
            	builder.Where(user.UsernameEQ(req.GetUsername()))
            default:
            	return nil, fmt.Errorf("invalid query by type")
            }

            entity, err := builder.Only(ctx)
            if err != nil {
            	if !ent.IsNotFound(err) {
            		r.log.Errorf("get user failed: %s", err.Error())
            	}
            	return nil, err
            }

            dto := r.mapper.ToDTO(entity)
            if custom, ok := any(r).(interface {
            	userEnrichGetDTO(context.Context, []*ent.User) ([]*identityv1.User, error)
            }); ok {
            	items, err := custom.userEnrichGetDTO(ctx, []*ent.User{entity})
            	if err != nil {
            		return nil, err
            	}
            	if len(items) == 0 {
            		return nil, fmt.Errorf("user relation hydration returned no result")
            	}
            	dto = items[0]
            }

            return dto, nil
      filters:
        allow:
            - id
            - username
            - nickname
            - realname
            - email
            - mobile
            - telephone
            - avatar
            - address
            - region
            - description
            - gender
            - last_login_at
            - last_login_ip
            - created_at
            - status
            - created_by
            - updated_by
            - deleted_by
            - remark
            - tenant_id
      service_methods:
        EditUserPassword:
            imports:
                - alias: authenticationv1
                  path: '{{module}}/api/gen/authentication/v1'
            repos:
                - field: userCredentialRepo
                  interface: UserCredentialRepo
            body: |-
                user, err := s.{{repoField}}.Get({{ctx}}, &v11.GetUserRequest{
                  QueryBy: &v11.GetUserRequest_Id{
                    Id: {{param.req}}.GetUserId(),
                  },
                })
                if err != nil {
                  return nil, err
                }

                if _, err = s.userCredentialRepo.ResetCredential({{ctx}}, &authenticationv1.ResetCredentialRequest{
                  IdentityType:  authenticationv1.UserCredential_USERNAME,
                  Identifier:    user.GetUsername(),
                  NewCredential: {{param.req}}.GetNewPassword(),
                  NeedDecrypt:   false,
                }); err != nil {
                  s.log.Errorf("reset user password err: %v", err)
                  return nil, err
                }

                return {{successReturn}}, nil
      operations:
        create: true
        delete: true
        exists: true
        get: true
        list: true
        update: true
      generate:
        service_stub: true
        repo_crud: true
        rest_register: true
        grpc_register: true
