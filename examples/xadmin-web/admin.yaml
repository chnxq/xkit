service: admin
module: xadmin-web

resources:
  - name: user
    proto_service: admin.service.v1.UserService
    entity: User
    dto_import: xadmin-web/api/gen/identity/v1
    dto_type: User
    repo_interface: UserRepo
    exists_fields:
      - id
      - username

    filters:
      allow:
        - id
        - username
        - tenant_id
        - status

    operations:
      list: true
      get: true
      count: true
      create: true
      update: true
      delete: true
      exists: true

    generate:
      service_stub: true
      repo_crud: true
      rest_register: true
      grpc_register: true
      wire: true
